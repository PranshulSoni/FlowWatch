[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flowwatch-client"
version = "3.1.4"
description = "Python client for FlowWatch — connect to a running FlowWatch sidecar"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "PranshulSoni", email = "pranshulsoni2006marvel@gmail.com" }]
keywords = ["flowwatch", "observability", "feature-flags", "workflows"]
dependencies = ["httpx>=0.27"]

[project.urls]
Homepage = "https://github.com/PranshulSoni/FlowWatch"
Repository = "https://github.com/PranshulSoni/FlowWatch"

[tool.hatch.build.targets.wheel]
packages = ["src/flowwatch"]
