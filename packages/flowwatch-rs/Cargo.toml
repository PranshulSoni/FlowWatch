[package]
name = "pranshulsoni-flowwatch"
version = "3.1.4"
edition = "2021"
description = "Rust client for FlowWatch — connect to a running FlowWatch sidecar"
readme = "README.md"
license = "MIT"
repository = "https://github.com/PranshulSoni/FlowWatch"
keywords = ["flowwatch", "observability", "feature-flags", "workflows"]

[dependencies]
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
